<!-- inbox.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - XQ PAY</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .msg-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }

        .msg-card.read {
            border-left-color: #E2E8F0;
            opacity: 0.8;
        }

        .msg-time {
            font-size: 11px;
            color: #64748B;
            margin-bottom: 8px;
        }
    </style>
</head>

<body>
    <header class="main-header">
        <div class="logo-area" onclick="window.location.href='profile.html'" style="cursor: pointer;">
            <i class="fa-solid fa-chevron-left" style="font-size: 18px; margin-right: 5px;"></i>
            <h1 class="app-name">Inbox</h1>
        </div>
        <div class="header-right">
            <i class="fa-solid fa-envelope-open-text"></i>
        </div>
    </header>

    <div class="app-container">

        <div id="msgList" style="padding: 0 20px 100px;">
            <!-- Messages will appear here -->
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./js/firebase.js";
        import { collection, onSnapshot, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = "login.html"; return; }

            onSnapshot(query(collection(db, "users", user.uid, "inbox"), orderBy("timestamp", "desc")), (sn) => {
                const list = document.getElementById('msgList');
                list.innerHTML = '';
                if (sn.empty) {
                    list.innerHTML = '<div style="text-align: center; margin-top: 50px; color: #64748B;"><i class="fa-solid fa-inbox" style="font-size: 48px; margin-bottom: 15px; opacity: 0.3;"></i><p>Your inbox is empty</p></div>';
                    return;
                }
                sn.forEach(docSnap => {
                    const msg = docSnap.data();
                    const card = document.createElement('div');
                    card.className = `msg-card ${msg.status}`;
                    card.innerHTML = `
                        <div class="msg-time">${new Date(msg.timestamp).toLocaleString()}</div>
                        <h3 style="margin: 0 0 8px 0; font-size: 16px;">${msg.title}</h3>
                        <p style="margin: 0; font-size: 14px; color: #1E293B;">${msg.message}</p>
                    `;
                    card.onclick = () => {
                        updateDoc(doc(db, "users", user.uid, "inbox", docSnap.id), { status: 'read' });
                    };
                    list.appendChild(card);

                    // Auto mark as read when viewed if you want the dot to disappear immediately
                    if (msg.status === 'unread') {
                        updateDoc(doc(db, "users", user.uid, "inbox", docSnap.id), { status: 'read' });
                    }
                });
            });
        });
    </script>
</body>

</html>
