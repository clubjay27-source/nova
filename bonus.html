<!-- bonus.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonus Centre - XQ PAY</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .bonus-card {
            background: white;
            padding: 24px;
            border-radius: 24px;
            margin: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid #F1F5F9;
        }

        .bonus-icon {
            font-size: 48px;
            color: #FBBF24;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <header class="main-header">
        <div class="logo-area" onclick="window.location.href='profile.html'" style="cursor: pointer;">
            <i class="fa-solid fa-chevron-left" style="font-size: 18px; margin-right: 5px;"></i>
            <h1 class="app-name">Bonus Centre</h1>
        </div>
        <div class="header-right">
            <i class="fa-solid fa-gift"></i>
        </div>
    </header>

    <div class="app-container">

        <div class="bonus-card">
            <i class="fa-solid fa-gift bonus-icon"></i>
            <h2 style="margin-bottom: 8px;">Claim your Bonus</h2>
            <p style="color: #64748B; font-size: 14px; margin-bottom: 24px;">Click the button below to see if you have
                any rewards waiting for you!</p>
            <button class="btn-gradient" id="claimBtn">Check & Claim Bonus</button>
        </div>

        <div id="bonusStatus" style="padding: 0 20px; text-align: center; color: #64748B;"></div>
    </div>

    <script type="module">
        import { auth, db } from "./js/firebase.js";
        import { doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { showPopup } from "./js/utils.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "login.html"; return; }

            document.getElementById('claimBtn').onclick = async () => {
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    const data = snap.data();
                    const bonus = data.pendingBonus || 0;
                    if (bonus > 0) {
                        await updateDoc(userRef, {
                            diamonds: increment(bonus),
                            pendingBonus: 0
                        });
                        showPopup(`Congratulations! You claimed ${bonus} bonus diamonds.`);
                        document.getElementById('bonusStatus').textContent = "Bonus claimed successfully!";
                    } else {
                        showPopup("No pending bonus found.");
                        document.getElementById('bonusStatus').textContent = "No rewards available at this time. Check back later!";
                    }
                }
            };
        });
    </script>
</body>

</html>
