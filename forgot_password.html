<!-- forgot_password.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forgot Password - XQ PAY</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta name="theme-color" content="#6C3EF4">
</head>

<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>XQ PAY</h1>
            <p>Reset your password</p>
        </div>

        <div class="auth-card">
            <h2>Forgot Password</h2>
            <div id="resetForm">
                <p
                    style="font-size: 14px; color: var(--text-gray); margin-bottom: 24px; text-align: center; line-height: 1.6;">
                    Password reset is only available via Customer Support for security reasons. Please contact our 24/7
                    support team to reset your password.
                </p>
                <button onclick="window.location.href='customer_service.html'" class="btn-gradient"
                    style="margin-bottom: 12px; width: 100%;">Contact Support</button>
            </div>
        </div>

        <div class="auth-footer">
            <p>Remember your password? <a href="login.html">Login</a></p>
        </div>
    </div>

    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
    </div>

    <script type="module">
        import { auth } from "./js/firebase.js";
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { initPopup, showPopup } from "./js/utils.js";

        initPopup();

        const resetForm = document.getElementById('resetForm');
        const loader = document.getElementById('loader');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value.trim();

            if (!email) {
                showPopup("Please enter your email");
                return;
            }

            loader.style.display = 'flex';
            try {
                await sendPasswordResetEmail(auth, email);
                showPopup("Password reset link sent to your email!");
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 3000);
            } catch (error) {
                console.error("Password reset error:", error);

                // Friendly error messages
                let msg = error.message;
                if (error.code === 'auth/user-not-found') msg = "No user found with this email";
                if (error.code === 'auth/invalid-email') msg = "Invalid email format";

                showPopup(msg);
            } finally {
                loader.style.display = 'none';
            }
        });
    </script>
</body>

</html>
