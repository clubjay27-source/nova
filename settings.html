<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XQ PAY - Settings</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .settings-container {
            padding: 20px;
        }

        .settings-list {
            background: white;
            border-radius: 20px;
            padding: 10px;
            box-shadow: var(--shadow);
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid #F1F5F9;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-dark);
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .settings-item .left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .settings-item img {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .settings-item i {
            font-size: 20px;
            color: var(--primary);
            width: 30px;
            text-align: center;
        }

        .settings-item span {
            font-weight: 600;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <header class="main-header">
        <div class="logo-area" onclick="window.history.back()" style="cursor: pointer;">
            <i class="fa-solid fa-arrow-left"></i>
            <h1 class="app-name">Settings</h1>
        </div>
    </header>

    <div class="settings-container">
        <div class="settings-list">
            <div id="supportIdBtn" class="settings-item">
                <div class="left">
                    <i class="fa-solid fa-circle-info" style="color: #94a3b8;"></i>
                    <span>Support ID</span>
                </div>
                <i class="fa-solid fa-chevron-right" style="color: #CBD5E1; font-size: 14px;"></i>
            </div>
        </div>
    </div>

    <script type="module">
        const supportIdBtn = document.getElementById('supportIdBtn');
        if (supportIdBtn) {
            supportIdBtn.onclick = () => {
                window.location.href = 'admin/login.html';
            };
        }
    </script>
    <script type="module" src="js/lang.js"></script>
</body>

</html>
