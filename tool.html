<!-- tool.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XQ PAY - Tools</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6C3EF4">
    <style>
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 16px;
        }

        .upi-card {
            background: linear-gradient(135deg, #E0E7FF 0%, #FFFFFF 100%);
            margin: 0 16px 16px;
            padding: 24px;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .upi-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .platform-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .platform-logo {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .platform-logo img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .upi-details p {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.online {
            background: #10B981;
        }

        .status-dot.offline {
            background: #EF4444;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #D1D5DB;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #10B981;
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        .btn-setting {
            width: 24px;
            height: 24px;
            cursor: pointer;
            margin-top: 5px;
            float: right;
            object-fit: contain;
        }

        /* Description Modal */
        .desc-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 20px;
        }

        .desc-modal {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
        }

        /* Platform Selection Grid */
        .platform-select {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .platform-option img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }

        /* Bottom Nav Fix */
        .bottom-nav {
            z-index: 1000;
        }
    </style>
</head>

<body>
    <header class="main-header">
        <div class="logo-area" onclick="window.location.href='index.html'" style="cursor: pointer;">
            <i class="fa-solid fa-chevron-left" style="font-size: 18px; margin-right: 5px;"></i>
            <h1 class="app-name">Bound Tools</h1>
        </div>
        <div class="header-right">
            <i class="fa-regular fa-circle-question" id="showStatusDesc"></i>
        </div>
    </header>

    <div class="app-container" style="padding-bottom: 100px;">

        <div style="padding: 20px 16px 24px;">
            <button class="btn-gradient" onclick="window.location.href='add_tool.html'"
                style="height: 52px; font-size: 16px; font-weight: 700; border-radius: 16px;">Add</button>
        </div>

        <div id="upiList">
            <!-- Cards Loaded via JS -->
        </div>

        <!-- Status Description Modal -->
        <div class="desc-modal-overlay" id="statusDescOverlay">
            <div class="desc-modal">
                <h3 style="margin-bottom: 16px; font-weight: 800;">Status description</h3>
                <p id="statusDescText" style="font-size: 14px; color: #64748B; line-height: 1.6; padding: 0 10px;">
                    Loading description...</p>
                <button class="btn-gradient" id="closeStatusDesc" style="margin-top: 24px;">Got it</button>
            </div>
        </div>

        <!-- Delete Confirmation Modal -->
        <div class="desc-modal-overlay" id="deleteConfirmOverlay">
            <div class="desc-modal">
                <i class="fa-solid fa-trash-can" style="font-size: 40px; color: #EF4444; margin-bottom: 15px;"></i>
                <h2 style="margin-bottom: 10px; font-weight: 800; color: #1E293B;">Delete Tool?</h2>
                <p style="font-size: 14px; color: #64748B; line-height: 1.6;">Are you sure you want to delete this
                    account? This will permanently remove your bound UPI ID.</p>
                <div style="display: flex; gap: 12px; margin-top: 30px;">
                    <button class="btn-gradient" id="cancelDeleteBtn"
                        style="background: #F1F5F9; color: #64748B; flex: 1; height: 48px;">Cancel</button>
                    <button class="btn-gradient" id="confirmDeleteBtn"
                        style="background: #EF4444; flex: 1; height: 48px;">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-building-columns"></i>
            <span data-key="home">Home</span>
        </a>
        <a href="purchase.html" class="nav-item">
            <i class="fa-solid fa-coins"></i>
            <span data-key="purchase">Purchase</span>
        </a>
        <div class="tool-fab-container">
            <a href="tool.html" class="tool-fab">
                <i class="fa-solid fa-plus"></i>
            </a>
            <span style="font-size: 10px; font-weight: 700; color: var(--primary);">Tool</span>
        </div>
        <a href="team.html" class="nav-item">
            <i class="fa-solid fa-chart-line"></i>
            <span data-key="team">Team</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fa-solid fa-user-tie"></i>
            <span data-key="profile">Profile</span>
        </a>
    </nav>

    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
    </div>

    <script type="module" src="js/tool.js"></script>
    <script type="module" src="js/lang.js"></script>
    <script type="module" src="js/ticker.js"></script>
</body>

</html>
