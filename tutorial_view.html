<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XQ PAY - Tutorial</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: white;
            color: #1E293B;
        }

        .tutorial-header {
            padding: 24px 20px;
            border-bottom: 1px solid #F1F5F9;
        }

        .tutorial-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .tutorial-meta {
            font-size: 14px;
            color: #64748B;
            font-weight: 500;
        }

        .tutorial-body {
            padding: 24px 20px;
            line-height: 1.8;
            font-size: 15px;
        }

        .tutorial-body img {
            max-width: 100%;
            border-radius: 12px;
            margin: 20px 0;
        }

        .tutorial-body h2 {
            font-size: 20px;
            font-weight: 700;
            margin: 30px 0 15px;
        }

        .tutorial-body ol,
        .tutorial-body ul {
            padding-left: 20px;
            margin: 20px 0;
        }

        .tutorial-body li {
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <header class="main-header"
        style="background: white; border-bottom: 1px solid #F1F5F9; color: black; box-shadow: none;">
        <div class="logo-area" onclick="window.history.back()" style="cursor: pointer;">
            <i class="fa-solid fa-chevron-left" style="font-size: 18px; color: #1E293B;"></i>
            <h1 id="topTitle" class="app-name"
                style="color: #1E293B; text-transform: none; font-size: 18px; margin-left: 20px;">Tutorial</h1>
        </div>
    </header>

    <div id="loader" style="padding: 50px; text-align: center;">
        <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 32px; color: var(--primary);"></i>
    </div>

    <div id="contentArea" style="display: none;">
        <div class="tutorial-header">
            <h1 class="tutorial-title" id="tutTitle">---</h1>
            <p class="tutorial-meta" id="tutDate">----</p>
        </div>

        <div class="tutorial-body" id="tutContent">
            <!-- Content will be injected here -->
        </div>
    </div>

    <script type="module">
        import { db } from "./js/firebase.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const tutId = urlParams.get('id');

        if (!tutId) {
            window.location.href = "index.html";
        }

        async function loadTutorial() {
            try {
                const docSnap = await getDoc(doc(db, "tutorials", tutId));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('tutTitle').textContent = data.title;
                    document.getElementById('topTitle').textContent = data.title;
                    document.getElementById('tutContent').innerHTML = data.content || "No content available.";

                    if (data.createdAt) {
                        const date = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
                        document.getElementById('tutDate').textContent = date.toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' });
                    }

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('contentArea').style.display = 'block';
                } else {
                    alert("Tutorial not found");
                    window.history.back();
                }
            } catch (e) {
                console.error(e);
                alert("Error loading tutorial");
            }
        }

        loadTutorial();
    </script>
</body>

</html>
