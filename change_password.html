<!-- change_password.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - XQ PAY</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body style="background: white;">
    <div class="app-container">
        <header style="padding: 20px; display: flex; align-items: center; gap: 15px;">
            <a href="profile.html" style="color: #1E293B;"><i class="fa-solid fa-chevron-left"
                    style="font-size: 20px;"></i></a>
            <h1 style="font-size: 20px; font-weight: 800; margin: 0;">Change Password</h1>
        </header>

        <div style="padding: 20px;">
            <p style="color: #64748B; margin-bottom: 30px; font-size: 14px;">Please enter your current password and your
                new password to update your account security.</p>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="currentPass" class="input-field" placeholder="Current Password">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="newPass" class="input-field" placeholder="New Password (min 6 chars)">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-check-double"></i>
                <input type="password" id="confirmPass" class="input-field" placeholder="Confirm New Password">
            </div>

            <button class="btn-gradient" style="margin-top: 20px;" id="updateBtn">Update Password</button>
        </div>
    </div>

    <script type="module">
        import { auth } from "./js/firebase.js";
        import { EmailAuthProvider, reauthenticateWithCredential, updatePassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { showPopup } from "./js/utils.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = "login.html"; return; }
        });

        document.getElementById('updateBtn').onclick = async () => {
            const currentPass = document.getElementById('currentPass').value;
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;

            if (!currentPass || !newPass || !confirmPass) {
                showPopup("All fields are required");
                return;
            }

            if (newPass.length < 6) {
                showPopup("New password must be at least 6 characters");
                return;
            }

            if (newPass !== confirmPass) {
                showPopup("Passwords do not match");
                return;
            }

            try {
                const credential = EmailAuthProvider.credential(auth.currentUser.email, currentPass);
                await reauthenticateWithCredential(auth.currentUser, credential);
                await updatePassword(auth.currentUser, newPass);
                showPopup("Password updated successfully!");
                setTimeout(() => window.location.href = "profile.html", 1500);
            } catch (e) {
                showPopup("Error: " + e.message);
            }
        };
    </script>
</body>

</html>
