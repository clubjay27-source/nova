<!-- withdraw.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - XQ PAY</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .hist-card {
            background: white;
            padding: 15px 20px;
            border-radius: 16px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .platform-tag {
            background: #F1F5F9;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            color: #64748B;
            margin-top: 5px;
            display: inline-block;
        }
    </style>
</head>

<body>
    <header class="main-header">
        <div class="logo-area" onclick="window.location.href='profile.html'" style="cursor: pointer;">
            <i class="fa-solid fa-chevron-left" style="font-size: 18px; margin-right: 5px;"></i>
            <h1 class="app-name">Withdraw</h1>
        </div>
        <div class="header-right">
            <i class="fa-solid fa-wallet"></i>
        </div>
    </header>

    <div class="app-container">

        <div
            style="background: white; margin: 0 20px 20px; padding: 24px; border-radius: 20px; box-shadow: var(--shadow); text-align: center;">
            <p style="font-size: 13px; color: #64748B; margin-bottom: 8px;">Total Selling Amount Earned</p>
            <h1 id="totalEarned" style="font-size: 32px; font-weight: 800; color: #10B981; margin: 0;">0.00</h1>
        </div>

        <h3 style="padding: 0 20px; font-size: 16px; font-weight: 800; margin-bottom: 15px;">Withdraw History</h3>

        <div id="histList" style="padding: 0 20px 100px;">
            <!-- History items will appear here -->
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./js/firebase.js";
        import { collection, onSnapshot, query, orderBy, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "login.html"; return; }

            // Get total selling amount
            onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('totalEarned').textContent = parseFloat(data.stats?.totalWithdraw || 0).toFixed(2);
                }
            });

            // Get history
            onSnapshot(query(collection(db, "users", user.uid, "sell_history"), orderBy("timestamp", "desc")), (sn) => {
                const list = document.getElementById('histList');
                list.innerHTML = '';
                if (sn.empty) {
                    list.innerHTML = '<div style="text-align: center; margin-top: 50px; color: #64748B;"><i class="fa-solid fa-clock-rotate-left" style="font-size: 48px; margin-bottom: 15px; opacity: 0.3;"></i><p>No withdraw history</p></div>';
                    return;
                }
                sn.forEach(docSnap => {
                    const item = docSnap.data();
                    const card = document.createElement('div');
                    card.className = 'hist-card';
                    card.innerHTML = `
                        <div>
                            <div style="font-size: 12px; color: #64748B;">${new Date(item.timestamp).toLocaleString()}</div>
                            <div style="font-weight: 700; font-size: 16px; margin-top: 4px;">₹ ${parseFloat(item.amount).toFixed(2)}</div>
                            <div class="platform-tag">${item.platform}</div>
                        </div>
                        <div style="text-align: right;">
                            <div style="color: ${item.status === 'success' ? '#10B981' : '#EF4444'}; font-weight: 800; font-size: 14px; text-transform: capitalize;">${item.status}</div>
                            ${item.reason ? `<div style="font-size: 11px; color: #EF4444; margin-top: 4px;">${item.reason}</div>` : ''}
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
        });
    </script>
</body>

</html>
